jdk:
  - openjdk17

# Maven Central is the canonical distribution channel (both modules are
# published there at the same version); JitPack is best-effort.
# publishToMavenLocal covers every publication of BOTH published modules
# without depending on publication names.
install:
  - ./gradlew :library:publishToMavenLocal :library-dynamic:publishToMavenLocal -Dorg.gradle.daemon=false
