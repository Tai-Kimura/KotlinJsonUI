name: ci

# Per-push verification for the published modules. Keeps the zero-deprecation
# state reached in the 2.9.3 migration from regressing, and runs the JVM unit
# suites. The Compose-dynamic conformance suite (emulator) lives in the
# jsonui-cli repo's conformance-mobile workflow, not here.
#
# NOTE: :sample-app is NOT compiled here yet — it currently does not build
# (generated with an old kjui_tools generation; VM contract drifted). Enable
# a :sample-app:compileDevDebugKotlin step once the sample-app regen
# migration lands.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Compile (release, all warnings)
        run: |
          ./gradlew :library:compileReleaseKotlin :library-dynamic:compileReleaseKotlin \
            --warning-mode all --rerun-tasks 2>&1 | tee compile.log
      - name: Deprecation-warning gate (zero tolerated)
        # 2.9.3 removed every deprecation warning from both published modules.
        # Fail if any Kotlin warning mentioning deprecation comes back.
        run: |
          if grep -E "^w: .*[Dd]eprecat" compile.log; then
            echo "::error::deprecation warnings reintroduced (see above)"
            exit 1
          fi
          echo "deprecation gate: OK"
      - name: Unit tests
        run: ./gradlew :library:testReleaseUnitTest :library-dynamic:testReleaseUnitTest
      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            library/build/reports/tests/
            library-dynamic/build/reports/tests/
