name: ci

# Per-push verification for the published modules. Keeps the zero-deprecation
# state reached in the 2.9.3 migration from regressing, and runs the JVM unit
# suites. The Compose-dynamic conformance suite (emulator) lives in the
# jsonui-cli repo's conformance-mobile workflow, not here.
#
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Compile (release, all warnings)
        run: |
          ./gradlew :library:compileReleaseKotlin :library-dynamic:compileReleaseKotlin \
            :sample-app:compileDevDebugKotlin \
            --warning-mode all --rerun-tasks 2>&1 | tee compile.log
      - name: Warning gate (zero tolerated)
        # 2.9.3 removed every deprecation warning and the follow-up brush-up
        # removed the remaining named-parameter / unchecked-cast warnings.
        # Fail if ANY Kotlin compiler warning comes back.
        run: |
          if grep -E "^w: " compile.log; then
            echo "::error::compiler warnings reintroduced (see above)"
            exit 1
          fi
          echo "warning gate: OK"
      - name: Unit tests
        run: ./gradlew :library:testReleaseUnitTest :library-dynamic:testReleaseUnitTest
      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            library/build/reports/tests/
            library-dynamic/build/reports/tests/
